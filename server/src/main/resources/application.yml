server:
  port: 8080

spring:
  datasource:
    url: jdbc:h2:mem:avalondb
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
  h2:
    console:
      enabled: true   # http://localhost:8080/h2-console для отладки

  servlet:
    multipart:
      max-file-size: 50MB     # загрузка карт
      max-request-size: 50MB

upload:
  path: ./uploads             # куда сохраняем загруженные карты